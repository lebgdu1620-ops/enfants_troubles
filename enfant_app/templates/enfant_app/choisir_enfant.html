<!DOCTYPE html>
<html>
<head>
    <meta charset="UTF-8">
    <title>Qui es-tu ?</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            font-family: Arial, sans-serif;
        }
        h1 {
            color: white;
            font-size: 3rem;
            margin-bottom: 40px;
            text-align: center;
        }
        .grille {
            display: flex;
            flex-wrap: wrap;
            gap: 20px;
            justify-content: center;
            padding: 20px;
        }
        .carte-enfant {
            background: white;
            border-radius: 30px;
            padding: 30px 40px;
            text-align: center;
            cursor: pointer;
            text-decoration: none;
            transition: transform 0.2s;
            box-shadow: 0 8px 25px rgba(0,0,0,0.2);
        }
        .carte-enfant:hover {
            transform: scale(1.1);
        }
        .avatar {
            font-size: 5rem;
            display: block;
            margin-bottom: 15px;
        }
        .nom {
            font-size: 1.8rem;
            color: #333;
            font-weight: bold;
        }
    </style>
</head>
<body>
    <h1>👋 Qui es-tu ?</h1>
    <div class="grille">
        {% for enfant in enfants %}
        <a class="carte-enfant" href="{% url 'taches_enfant' enfant.id %}">
            <span class="avatar">{{ enfant.avatar }}</span>
            <span class="nom">{{ enfant.prenom }}</span>
        </a>
        {% empty %}
        <p style="color:white; font-size:1.5rem;">Aucun enfant trouvé.</p>
        {% endfor %}
    </div>
</body>
</html>
