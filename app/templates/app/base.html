<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>{% block titre %}Mes Tâches{% endblock %}</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            font-family: 'Comic Sans MS', cursive;
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
        }
        .container { max-width: 900px; margin: 0 auto; padding: 20px; }
        .carte {
            background: white;
            border-radius: 20px;
            padding: 25px;
            box-shadow: 0 10px 30px rgba(0,0,0,0.2);
            margin-bottom: 20px;
        }
        .btn {
            display: inline-block;
            padding: 15px 30px;
            border-radius: 50px;
            border: none;
            font-size: 1.2rem;
            font-family: inherit;
            cursor: pointer;
            transition: transform 0.2s;
            text-decoration: none;
            color: white;
        }
        .btn:hover { transform: scale(1.05); }
        .btn-vert { background: #4CAF50; }
        .btn-bleu { background: #2196F3; }
        h1 { color: #5c35a3; margin-bottom: 15px; }
    </style>
</head>
<body>
<div class="container">
    {% block content %}{% endblock %}
</div>
{% block scripts %}{% endblock %}
</body>
</html>
