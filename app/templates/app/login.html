<!DOCTYPE html>
<html lang="fr">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Connexion</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        
        body {
            background: linear-gradient(135deg, #667eea, #764ba2);
            min-height: 100vh;
            display: flex;
            align-items: center;
            justify-content: center;
            font-family: 'Arial Rounded MT Bold', Arial, sans-serif;
        }
        
        .carte {
            background: white;
            border-radius: 30px;
            padding: 50px 40px;
            text-align: center;
            box-shadow: 0 20px 60px rgba(0,0,0,0.3);
            width: 90%;
            max-width: 400px;
        }
        
        .emoji-top {
            font-size: 5rem;
            margin-bottom: 10px;
        }
        
        h1 {
            font-size: 2rem;
            color: #5b2d8e;
            margin-bottom: 30px;
        }
        
        input {
            width: 100%;
            padding: 18px;
            font-size: 1.3rem;
            border: 3px solid #ddd;
            border-radius: 15px;
            margin-bottom: 15px;
            text-align: center;
            outline: none;
            transition: border-color 0.3s;
        }
        
        input:focus {
            border-color: #764ba2;
        }
        
        .btn {
            width: 100%;
            padding: 20px;
            font-size: 1.5rem;
            background: linear-gradient(135deg, #667eea, #764ba2);
            color: white;
            border: none;
            border-radius: 15px;
            cursor: pointer;
            margin-top: 10px;
            transition: transform 0.2s;
        }
        
        .btn:hover {
            transform: scale(1.05);
        }
        
        .erreur {
            background: #ffe0e0;
            color: #d00;
            padding: 15px;
            border-radius: 10px;
            margin-bottom: 15px;
            font-size: 1.1rem;
        }
    </style>
</head>
<body>
    <div class="carte">
        <div class="emoji-top">🌟</div>
        <h1>Bonjour !</h1>
        
        {% if erreur %}
        <div class="erreur">❌ {{ erreur }}</div>
        {% endif %}
        
        <form method="POST">
            {% csrf_token %}
            <input type="text" name="username" placeholder="Mon prénom" required>
            <input type="password" name="password" placeholder="Mon mot de passe" required>
            <button type="submit" class="btn">C'est parti ! 🚀</button>
        </form>
    </div>
</body>
</html>
